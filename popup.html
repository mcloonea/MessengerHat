<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: -apple-system, sans-serif; width: 200px; padding: 12px; background: #1c1c1e; color: #e5e5ea; margin: 0; }
  h3 { margin: 0 0 8px; font-size: 13px; color: #e5e5ea; }
  p { margin: 0; font-size: 11px; color: #8e8e93; line-height: 1.5; }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #30d158; margin-right: 6px; }
</style>
</head>
<body>
  <h3><span class="dot"></span>Messenger CRM</h3>
  <p>Active on Facebook Messenger.<br>Open a conversation to see CRM panel.</p>
</body>
</html>
